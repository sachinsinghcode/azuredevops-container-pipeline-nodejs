trigger:
 - master

pool:
 vmImage: ubuntu-latest

stages:
 - stage: BuildDockerImage
   displayName: Build Docker Image
   jobs: 
   - job: DockerBuild
     steps:
     - task: Docker@2
       displayName: 'Build Docker Image'
       inputs:
          command: 'build'
          repository: 'nodeJs'
          Dockerfile: '**/Dockerfile'
          tags: |
            $(Build.BuildId)
            latest

 - stage:
   displayName: Push Docker Image
   jobs:
   - job: DockerPush
     steps:
     - tasks: Docker@2
       displayName: 'Push Docker Image'
       inputs:
          command: 'push'
          containerRegistry: 'Azure'
          repository: 'Nodejs'
          tags: |
            $(Build.BuildId)
            latest
        
