  trigger:
  - feature/**

  pool:
    vmImage: ubuntu-latest

  variables:
    imageRepository: 'nodejs'
    imageTag: '$(Build.BuildId)'

  steps:

- task: Docker@2
  displayName: Build
  inputs:
    command: build
    repository: 'nodejs'
    dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)

- script: |
    curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
    trivy image --exit-code 1 --severity HIGH,CRITICAL nodejs:$(Build.BuildId)
  displayName: Scan Image

- task: Docker@2
  displayName: Push
  inputs:
    command: push
    containerRegistry: 'testacr'
    repository: 'nodejs'
    tags: |
      $(Build.BuildId)
      latest